; ============================================================
; LPS Node Firmware — ESP32-S3 + DWM3000 (PlatformIO / ESP-IDF)
; ============================================================
; Pin assignments (override per-env or via build_flags below)
;
;  DW3000 SPI  (SPI2 / FSPI)
;    MOSI    GPIO11
;    MISO    GPIO13
;    SCK     GPIO12
;    CS      GPIO10
;    IRQ     GPIO4
;    RST     GPIO5
;    WAKEUP  GPIO6   ← new: DWM3000 deep-sleep wake pad
;
;  WS2812B (onboard RGB LED)
;    Data    GPIO47
;
;  Button  GPIO0  (onboard BOOT button, active-low)
;
;  IMPORTANT: update PIN_DW_WAKEUP below to match your PCB wiring.
;             If the WAKEUP pad is not connected, tie it to any spare GPIO
;             and configure that GPIO here — the pin is driven low at idle
;             so an unconnected pad is harmless.
; ============================================================

[platformio]
default_envs = tdoa_anchor2_0, tdoa_anchor2_1, tdoa_anchor2_2, tdoa_tag

; ----- shared settings for all envs -------------------------
[env]
platform  = espressif32
framework = espidf
monitor_speed = 115200

board     = lolin_s3_mini

; Only compile the files that have been ported.
; Everything else (eeprom, lps25h, usb CDC, STM32 f0 HAL, …)
; is deliberately excluded.
; Exclude the old DW1000 library; lib/libdw3000 provides the DW3000 shim and
; decadriver. Algorithm files now include libdw3000_shim.h directly.
build_flags =
    ; ---- UWB radio defaults ----
    -D UWB_SMART_POWER=1
    -D UWB_FORCE_TX_POWER=0
    -D UWB_TX_POWER=0x1F1F1F1F
    -D UWB_LOW_BITRATE=0
    -D UWB_LONG_PREAMBLE=0

    ; ---- Anchor list (used in tag/TDoA modes) ----
    ; Number of anchors in the default list {0,1,2,3,4,5}
    -D ANCHOR_LIST_SIZE=3

; ----- per-node environments --------------------------------

; [env:anchor]
; ; TWR Anchor (mode 0)
; build_flags =
;     ${env.build_flags}

;     ; ---- DW3000 hardware pins ----
;     -D PIN_DW_MOSI=11
;     -D PIN_DW_MISO=13
;     -D PIN_DW_SCK=12
;     -D PIN_DW_CS=10
;     -D PIN_DW_IRQ=2
;     -D PIN_DW_RST=4
;     -D PIN_DW_WAKEUP=5     ; DWM3000 WAKEUP pad — adjust to match your wiring

;     ; ---- WS2812B onboard LED ----
;     -D PIN_LED_WS2812=47

;     ; ---- Button pin (BOOT button, active-low) ----
;     -D PIN_BUTTON=0

;     -D NODE_ADDRESS=0
;     -D NODE_MODE=0
;     -D NODE_ANCHOR_X=8.0
;     -D NODE_ANCHOR_Y=0.0
;     -D NODE_ANCHOR_Z=0.0

; [env:tag]
; ; TWR Tag (mode 1)
; build_flags =
;     ${env.build_flags}
;     -D NODE_ADDRESS=0
;     -D NODE_MODE=1
;     -D NODE_ANCHOR_X=8.0
;     -D NODE_ANCHOR_Y=0.0
;     -D NODE_ANCHOR_Z=0.0

[env:tdoa_anchor2]
; TDoA Anchor V2 (mode 3)
build_flags =
    ${env.build_flags}

    ; ---- DW3000 hardware pins ----
    -D PIN_DW_MOSI=11
    -D PIN_DW_MISO=13
    -D PIN_DW_SCK=12
    -D PIN_DW_CS=10
    -D PIN_DW_IRQ=2
    -D PIN_DW_RST=4
    -D PIN_DW_WAKEUP=5     ; DWM3000 WAKEUP pad — adjust to match your wiring

    ; ---- Button pin (BOOT button, active-low) ----
    -D PIN_BUTTON=0

    ; ---- WS2812B onboard LED ----
    -D PIN_LED_WS2812=47

    -D NODE_MODE=3

; [env:tdoa_anchor3]
; ; TDoA Anchor V3 (mode 4)
; build_flags =
;     ${env.build_flags}
;     -D NODE_ADDRESS=0
;     -D NODE_MODE=4
;     -D NODE_ANCHOR_X=8.0
;     -D NODE_ANCHOR_Y=0.0
;     -D NODE_ANCHOR_Z=0.0

[env:tdoa_anchor2_0]
extends = env:tdoa_anchor2
build_flags =
    ${env:tdoa_anchor2.build_flags}
    -D NODE_ADDRESS=0
    -D NODE_ANCHOR_X=0.0
    -D NODE_ANCHOR_Y=8.0
    -D NODE_ANCHOR_Z=0.0

[env:tdoa_anchor2_1]
extends = env:tdoa_anchor2
build_flags =
    ${env:tdoa_anchor2.build_flags}
    -D NODE_ADDRESS=1
    -D NODE_ANCHOR_X=0.0
    -D NODE_ANCHOR_Y=0.0
    -D NODE_ANCHOR_Z=0.0

[env:tdoa_anchor2_2]
extends = env:tdoa_anchor2
build_flags =
    ${env:tdoa_anchor2.build_flags}
    -D NODE_ADDRESS=2
    -D NODE_ANCHOR_X=4.0
    -D NODE_ANCHOR_Y=0.0
    -D NODE_ANCHOR_Z=0.0

[env:tdoa_anchor2_3]
extends = env:tdoa_anchor2
board = m5stickc_plus2
build_unflags =
    -D PIN_DW_MOSI=11
    -D PIN_DW_MISO=13
    -D PIN_DW_SCK=12
    -D PIN_DW_CS=10
    -D PIN_DW_IRQ=2
    -D PIN_DW_RST=4
    -D PIN_DW_WAKEUP=5
    -D PIN_LED_WS2812=47
    -D PIN_BUTTON=0

build_flags =
    ${env:tdoa_anchor2.build_flags}
    -D NODE_ADDRESS=3
    -D NODE_ANCHOR_X=0.0
    -D NODE_ANCHOR_Y=1.0
    -D NODE_ANCHOR_Z=0.0

    -D PIN_DW_MOSI=26
    -D PIN_DW_MISO=0
    -D PIN_DW_SCK=32
    -D PIN_DW_CS=33
    -D PIN_DW_IRQ=25

    -D PIN_BUTTON=37
    ; -D PIN_DW_RST=-1   ; not connected
    ; -D PIN_DW_WAKEUP=-1     ; not connected


[env:tdoa_tag]
; TDoA Tag V2 (mode 5) — passive listener, no transmit
; TDOA_TAG_OFFLOAD=1: gather measurements and print to serial for PC offload
; TDOA_TAG_OFFLOAD=0: on-device solver (stub, not yet implemented)
board = m5stickc_plus2
build_flags =
    ${env.build_flags}
    -D NODE_ADDRESS=5
    -D NODE_MODE=5
    -D TDOA_TAG_OFFLOAD=0

    -D PIN_DW_MOSI=26
    -D PIN_DW_MISO=0
    -D PIN_DW_SCK=32
    -D PIN_DW_CS=33
    -D PIN_DW_IRQ=25

    -D PIN_BUTTON=37
    ; -D PIN_DW_RST=-1   ; not connected
    ; -D PIN_DW_WAKEUP=-1     ; not connected

[env:tdoa_sniffer]
; Sniffer (mode 2)
extends = env:tdoa_tag
build_unflags =
    -D NODE_MODE=5
build_flags =
    ${env:tdoa_tag.build_flags}
    -D NODE_MODE=2

