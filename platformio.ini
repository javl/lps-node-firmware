; ============================================================
; LPS Node Firmware — ESP32-S3 (PlatformIO / ESP-IDF)
; ============================================================
; Pin assignments (override per-env or via build_flags below)
;
;  DW1000 SPI  (SPI2 / FSPI)
;    MOSI  GPIO11
;    MISO  GPIO13
;    SCK   GPIO12
;    CS    GPIO10
;    IRQ   GPIO4
;    RST   GPIO5
;
;  LEDs (external, active-high)
;    Ranging  GPIO35
;    Sync     GPIO36
;    Mode     GPIO37
;
;  Button  GPIO0  (onboard BOOT button, active-low)
; ============================================================

[platformio]
default_envs = anchor

; ----- shared settings for all envs -------------------------
[env]
platform  = espressif32
board     = lolin_s3_mini
framework = espidf
monitor_speed = 115200

; Only compile the files that have been ported.
; Everything else (eeprom, lps25h, usb CDC, STM32 f0 HAL, …)
; is deliberately excluded.
build_src_filter =
    -<*>
    +<main.c>
    +<cfg.c>
    +<dwOps.c>
    +<uwb.c>
    +<led.c>
    +<button.c>
    +<lpp.c>
    +<mac.c>
    +<uwb_twr_anchor.c>
    +<uwb_twr_tag.c>
    +<uwb_tdoa_anchor2.c>
    +<uwb_tdoa_anchor3.c>
    +<uwb_sniffer.c>

build_flags =
    ; Include paths
    -I inc
    -I lib/libdw1000/inc

    ; ---- DW1000 hardware pins ----
    -D PIN_DW_MOSI=11
    -D PIN_DW_MISO=13
    -D PIN_DW_SCK=12
    -D PIN_DW_CS=10
    -D PIN_DW_IRQ=4
    -D PIN_DW_RST=5

    ; ---- LED pins (external, active-high) ----
    -D PIN_LED_RANGING=35
    -D PIN_LED_SYNC=36
    -D PIN_LED_MODE=37

    ; ---- Button pin (BOOT button, active-low) ----
    -D PIN_BUTTON=0

    ; ---- UWB radio defaults ----
    -D UWB_SMART_POWER=1
    -D UWB_FORCE_TX_POWER=0
    -D UWB_TX_POWER=0x1F1F1F1F
    -D UWB_LOW_BITRATE=0
    -D UWB_LONG_PREAMBLE=0

    ; ---- Anchor list (used in tag/TDoA modes) ----
    ; Number of anchors in the default list {0,1,2,3,4,5}
    -D ANCHOR_LIST_SIZE=6

lib_deps =
    ; libdw1000 is kept in lib/libdw1000 — PlatformIO picks it up
    ; automatically via the library.json placed there.

; ----- per-node environments --------------------------------

[env:anchor]
; TWR Anchor (mode 0)
build_flags =
    ${env.build_flags}
    -D NODE_ADDRESS=0
    -D NODE_MODE=0

[env:tag]
; TWR Tag (mode 1)
build_flags =
    ${env.build_flags}
    -D NODE_ADDRESS=0
    -D NODE_MODE=1

[env:tdoa_anchor2]
; TDoA Anchor V2 (mode 3)
build_flags =
    ${env.build_flags}
    -D NODE_ADDRESS=0
    -D NODE_MODE=3

[env:tdoa_anchor3]
; TDoA Anchor V3 (mode 4)
build_flags =
    ${env.build_flags}
    -D NODE_ADDRESS=0
    -D NODE_MODE=4
